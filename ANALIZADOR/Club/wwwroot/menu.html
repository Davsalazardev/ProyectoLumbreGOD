<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Menú - Club UPV</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect fill="%23111" width="100" height="100"/><circle cx="50" cy="50" r="1" fill="%23222"/></svg>');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .menu-wrapper {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .menu-box {
            background: rgba(10, 10, 20, 0.5);
            border: 2px solid rgba(42, 95, 141, 0.3);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 0 60px rgba(42, 95, 141, 0.2), inset 0 0 40px rgba(42, 95, 141, 0.1);
            backdrop-filter: blur(10px);
        }

        .menu-container {
            display: flex;
            gap: 0;
            height: 500px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            background: rgba(20, 20, 30, 0.95);
        }

        .menu-left {
            flex: 1;
            padding: 40px;
            background: linear-gradient(180deg, rgba(20, 20, 30, 0.98) 0%, rgba(15, 15, 25, 0.98) 100%);
            border: none;
            border-radius: 0;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
            max-height: 500px;
        }

        .menu-left::-webkit-scrollbar {
            width: 6px;
        }

        .menu-left::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .menu-left::-webkit-scrollbar-thumb {
            background: rgba(42, 95, 141, 0.5);
            border-radius: 3px;
        }

        .menu-left::-webkit-scrollbar-thumb:hover {
            background: rgba(42, 95, 141, 0.8);
        }

        .menu-right {
            flex: 1;
            background: linear-gradient(135deg, #3a7fbd 0%, #2a5f8d 50%, #1e4d7b 100%);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            min-width: 300px;
            position: relative;
            overflow: hidden;
        }

        .menu-right::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .menu-right::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .menu-right img {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            object-fit: contain;
            position: relative;
            z-index: 1;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .menu-right h2 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .menu-right p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 1;
        }

        .user-info {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffd700;
            font-weight: 600;
            font-size: 13px;
        }

        .menu-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: #0a0a14;
            border: 1px solid #333;
            color: #fff;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .form-group select:focus {
            outline: none;
            border-color: #666;
            background: #111;
            box-shadow: 0 0 8px rgba(100, 150, 200, 0.1);
        }

        .form-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .penguin-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .penguin-selector::-webkit-scrollbar {
            width: 6px;
        }

        .penguin-selector::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .penguin-selector::-webkit-scrollbar-thumb {
            background: rgba(42, 95, 141, 0.5);
            border-radius: 3px;
        }

        .penguin-option {
            padding: 12px 8px;
            border: 1px solid #333;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            background: #0a0a14;
            color: #999;
            font-size: 11px;
        }

        .penguin-option:hover {
            border-color: #666;
            background: #111;
            transform: translateY(-2px);
        }

        .penguin-option.selected {
            border-color: #2a5f8d;
            background: rgba(42, 95, 141, 0.2);
            color: #6ba3d1;
            font-weight: 600;
            box-shadow: 0 0 15px rgba(42, 95, 141, 0.3);
        }

        .penguin-option input {
            display: none;
        }

        .menu-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #fff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            border-color: #666;
            background: #222;
        }

        .btn-play {
            background: #2a5f8d;
            border-color: #2a5f8d;
        }

        .btn-play:hover {
            background: #3a7fad;
            border-color: #3a7fad;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #666;
        }

        @media (max-width: 900px) {
            .menu-container {
                flex-direction: column;
            }

            .menu-left {
                border-radius: 8px 8px 0 0;
                border-right: 1px solid #333;
            }

            .menu-right {
                border-radius: 0 0 8px 8px;
            }
        }

        @media (max-width: 600px) {
            .menu-box {
                padding: 0;
            }

            .menu-left {
                padding: 20px;
                border-radius: 8px 8px 0 0;
            }

            .menu-right {
                padding: 20px;
                border-radius: 0 0 8px 8px;
            }

            .menu-right img {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="menu-wrapper">
        <div class="menu-box">
            <div class="menu-container">
                <div class="menu-left">
                    <div class="user-info" id="userInfo">
                        Bienvenido
                    </div>

                    <form class="menu-form" id="menuForm">
                        <div class="form-group">
                            <label>Elige tu personaje</label>
                            <div class="penguin-selector" id="penguinSelector">
                                
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="deviceType">Tipo de dispositivo</label>
                            <select id="deviceType" required>
                                <option value="desktop">Computadora</option>
                                <option value="mobile">Móvil</option>
                            </select>
                        </div>

                        <div class="menu-buttons">
                            <button type="button" class="btn btn-play" id="playBtn">Jugar</button>
                            <button type="button" class="btn" id="logoutBtn">Salir</button>
                        </div>
                    </form>

                    <div class="footer-text">
                        Thomas x Malibran
                    </div>
                </div>

                <div class="menu-right">
                    <img src="/pinguino.png" alt="Pingüino" id="previewImage">
                    <h2>Club UPV</h2>
                    <p>Construyendo Conciencia</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userInfo = document.getElementById('userInfo');
        const deviceTypeSelect = document.getElementById('deviceType');
        const menuForm = document.getElementById('menuForm');
        const playBtn = document.getElementById('playBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const penguinSelector = document.getElementById('penguinSelector');
        const previewImage = document.getElementById('previewImage');

        // Cargar usuario actual
        const username = localStorage.getItem('currentUser') || 'Jugador';
        const userPassword = localStorage.getItem('userPassword') || '';

        // Personajes base (siempre disponibles)
        const baseCharacters = [
            { id: 'basico', name: '🐧 Clásico', image: '/pinguino.png' },
            { id: 'chino', name: '🐧 Chino', image: '/pinguino_chino.png' }
        ];

        // Personajes de tienda
        const shopCharacters = [
            { id: 'gato_naranja', name: '🐱 Gato Naranja', image: '/gato_naranja.png' },
            { id: 'gato_vampiro', name: '🧛 Gato Vampiro', image: '/gato_vampiro.png' },
            { id: 'gato_vaquero', name: '🤠 Gato Vaquero', image: '/gato_vaquero.png' },
            { id: 'gato_langosta', name: '🦞 Gato Langosta', image: '/gato_langosta.png' },
            { id: 'foca', name: '🦭 Foca', image: '/foca.png' },
            { id: 'conejo', name: '🐰 Conejo', image: '/conejo.png' }
        ];

        // Cargar personajes comprados
        const ownedCharacters = JSON.parse(localStorage.getItem('ownedCharacters')) || ['basico', 'chino'];

        // Combinar todos los personajes disponibles
        let availableCharacters = [...baseCharacters];
        shopCharacters.forEach(char => {
            if (ownedCharacters.includes(char.id)) {
                availableCharacters.push(char);
            }
        });

        // Variable para personaje seleccionado
        let selectedPenguin = localStorage.getItem('penguinType') || 'basico';
        if (!availableCharacters.find(c => c.id === selectedPenguin)) {
            selectedPenguin = 'basico';
        }

        // Generar selector de personajes
        function renderPenguinSelector() {
            penguinSelector.innerHTML = availableCharacters.map(char => `
                <label class="penguin-option ${char.id === selectedPenguin ? 'selected' : ''}" data-id="${char.id}" data-image="${char.image}">
                    <input type="radio" name="penguinType" value="${char.id}" ${char.id === selectedPenguin ? 'checked' : ''}>
                    <span>${char.name}</span>
                </label>
            `).join('');

            // Agregar event listeners
            document.querySelectorAll('.penguin-option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.penguin-option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    option.querySelector('input').checked = true;
                    selectedPenguin = option.dataset.id;
                    previewImage.src = option.dataset.image;
                });
            });

            // Actualizar preview inicial
            const currentChar = availableCharacters.find(c => c.id === selectedPenguin);
            if (currentChar) {
                previewImage.src = currentChar.image;
            }
        }

        renderPenguinSelector();

        // Credenciales de administrador
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = '89f281d2f35646ab02094fbcf020a9d0304da1c996f8ebcb';

        // Detectar si el usuario actual es administrador
        function isAdminUser() {
            return username === ADMIN_USERNAME && userPassword === ADMIN_PASSWORD;
        }

        // Mostrar usuario
        if (isAdminUser()) {
            userInfo.textContent = '👨‍💼 ' + username + ' (ADMINISTRADOR)';
            userInfo.style.background = 'rgba(255, 215, 0, 0.3)';
        } else {
            userInfo.textContent = 'Bienvenido, ' + username;
        }

        playBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const penguinType = document.querySelector('input[name="penguinType"]:checked').value;
            const deviceType = deviceTypeSelect.value;

            // Guardar opciones en localStorage
            localStorage.setItem('playerName', username);
            localStorage.setItem('penguinType', penguinType);
            localStorage.setItem('deviceType', deviceType);
            
            // Verificar si es admin y guardar
            if (isAdminUser()) {
                localStorage.setItem('isAdminMode', 'true');
                localStorage.setItem('adminPassword', ADMIN_PASSWORD);
                console.log('🔐 Modo Admin activado automáticamente');
            } else {
                localStorage.setItem('isAdminMode', 'false');
                localStorage.removeItem('adminPassword');
            }

            // Ir al juego
            window.location.href = '/game.html';
        });

        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // Limpiar datos
            localStorage.removeItem('currentUser');
            localStorage.removeItem('userPassword');
            localStorage.removeItem('playerName');
            localStorage.removeItem('penguinType');
            localStorage.removeItem('deviceType');
            localStorage.removeItem('isAdminMode');
            localStorage.removeItem('adminPassword');
            
            // Volver a login
            window.location.href = '/login.html';
        });

        // Permitir Enter para jugar
        menuForm.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                playBtn.click();
            }
        });
    </script>
</body>
</html>
